<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Pump Volume Control</title>
    <link rel="stylesheet" href="final.css">
    <script src="final.js" defer></script>
</head>
<body>
    <label for="volume-slider" id="vslabel">Air pump control: </label>
    <input type="range" id="volume-slider" min="0" max="100" value="0"><br id="br1">
    <label for="volDisplay" id="vdlabel">Numerical volume: </label>
    <p id="volDisplay">0</p>
    <label for="volumeDisp" id="vdsplabel">Volume slider display: </label>
    <input type="range" id="volumeDisp" min="0" max="100" value="0"><br id="br2">
    <input type="button" id="seal" value="seal">
    <input type="button" id="unseal" value="unseal"><br>
    <input type="button" id="close" value="^">
    <input type="button" id="open" value="v">

</body>
</html>
